name: Build Electron releases (Linux / macOS / Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build

      - name: Compile Electron TypeScript
        run: bun run electron:compile

      - name: Build platform-specific packages
        env:
          # Disable mac automatic identity discovery to avoid signing attempts
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'macos-latest' && 'false' || '' }}
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            bun run package:linux
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # produce unsigned .app (dir mode)
            bun run package:mac
          else
            # windows-latest runner
            bun run package:win
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-release
          path: release/
