name: Build Tauri (Windows)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - name: Get version tag
        id: version
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --prerelease --notes ""

          EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$EXE" "mirror-${TAG}-windows-tauri-setup.exe"
          gh release upload "$TAG" "mirror-${TAG}-windows-tauri-setup.exe" --clobber
