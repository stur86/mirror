name: Build Tauri (macOS)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - name: Generate icons
        run: bun run tauri:icons

      - name: Build
        # APPLE_SIGNING_IDENTITY=- disables codesigning for unsigned experimental builds.
        # For distribution, configure APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets
        # and set ENABLE_CODE_SIGNING=true in the Tauri bundle config.
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: bun run tauri:build

      - name: Get version tag
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch' || inputs.publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --prerelease --notes ""

          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "mirror-${TAG}-macos-tauri.dmg"
          gh release upload "$TAG" "mirror-${TAG}-macos-tauri.dmg" --clobber
