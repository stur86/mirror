name: Build Tauri (macOS)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: arm64
            tauri_target: ""
            bundle_subpath: release
            release_suffix: macos-tauri-arm64
          - arch: universal
            tauri_target: universal-apple-darwin
            bundle_subpath: universal-apple-darwin/release
            release_suffix: macos-tauri-universal

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - name: Install extra Rust targets
        if: matrix.tauri_target != ''
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Generate icons
        run: bun run tauri:icons

      - name: Build
        env:
          APPLE_SIGNING_IDENTITY: "-"
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          if [ -n "$TAURI_TARGET" ]; then
            bun run tauri:build -- --target "$TAURI_TARGET"
          else
            bun run tauri:build
          fi

      - name: Get version tag
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch' || inputs.publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --prerelease --notes ""
          DMG=$(ls src-tauri/target/${{ matrix.bundle_subpath }}/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "mirror-${TAG}-${{ matrix.release_suffix }}.dmg"
          gh release upload "$TAG" "mirror-${TAG}-${{ matrix.release_suffix }}.dmg" --clobber
