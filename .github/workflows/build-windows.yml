name: Build Electrobun release (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Electrobun)
        run: bun run electrobun:build --env=stable

      - name: Zip artifacts folder
        run:  Compress-Archive -Path artifacts/* -DestinationPath electrobun-windows-release.zip

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: electrobun-windows-release.zip
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: true
