name: Build Electrobun release (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Electrobun)
        run: bun run electrobun:build --env=stable

      - name: Zip artifacts folder
        run:  Compress-Archive -Path artifacts/* -DestinationPath electrobun-windows-release.zip

      - name: Get version tag
        id: version
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --prerelease --notes ""
          gh release upload "$TAG" electrobun-windows-release.zip --clobber
