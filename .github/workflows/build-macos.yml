name: Build Electron release (macOS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build

      - name: Compile Electron TypeScript
        run: bun run electron:compile

      - name: Package (macOS)
        env:
          # Disable mac automatic identity discovery to avoid signing attempts
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: bun run package:mac

      - name: Zip release folder
        run: zip -r macos-release.zip release/

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: macos-release.zip        # Path to file or folder
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: true