name: Build Electron release (macOS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build

      - name: Compile Electron TypeScript
        run: bun run electron:compile

      - name: Package (macOS)
        env:
          # Disable mac automatic identity discovery to avoid signing attempts
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: bun run package:mac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/
