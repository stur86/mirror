name: Build Tauri (Linux)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - name: Generate icons
        run: bun run tauri:icons

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-gl

      - name: Build
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: bun run tauri:build

      - name: Get version tag
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch' || inputs.publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --prerelease --notes ""

          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$APPIMAGE" "mirror-${TAG}-linux-tauri.AppImage"
          gh release upload "$TAG" "mirror-${TAG}-linux-tauri.AppImage" --clobber

          DEB=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          cp "$DEB" "mirror-${TAG}-linux-tauri.deb"
          gh release upload "$TAG" "mirror-${TAG}-linux-tauri.deb" --clobber
