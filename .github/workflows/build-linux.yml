name: Build Electron release (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun (runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run build

      - name: Compile Electron TypeScript
        run: bun run electron:compile

      - name: Package (Linux)
        run: bun run package:linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release/
